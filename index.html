<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Markdown → Rich Text</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      font: 14px/1.5 monospace;
      margin: 10px 0;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 16px;
    }
    button {
      padding: 10px 14px;
      cursor: pointer;
    }
    #preview {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      min-height: 220px;
      background: #fff;
      line-height: 1.5;
    }
    #preview img { max-width: 100%; }
    #preview pre {
      background: #f6f8fa;
      padding: 12px;
      overflow: auto;
      border-radius: 6px;
    }
    #preview blockquote {
      border-left: 4px solid #ddd;
      margin: 1em 0;
      padding-left: 12px;
      color: #555;
    }
    #preview table {
      border-collapse: collapse;
      width: 100%;
    }
    #preview th, #preview td {
      border: 1px solid #ddd;
      padding: 8px;
    }
  </style>
</head>
<body>
  <h2>Markdown → Rich Text</h2>

  <textarea id="md" placeholder="Paste Markdown here..."></textarea>

  <div class="row">
    <button id="render">Render Preview</button>
    <button id="copy">Copy Formatted</button>
  </div>

  <div id="preview"></div>

  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    const md = document.getElementById('md');
    const preview = document.getElementById('preview');

    function render() {
      preview.innerHTML = marked.parse(md.value || '');
    }

    function copyFormatted() {
      render();

      const range = document.createRange();
      range.selectNodeContents(preview);

      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);

      const ok = document.execCommand('copy');
      sel.removeAllRanges();

      alert(ok ? 'Copied formatted text!' : 'Copy failed. Try Ctrl/Cmd+C after selecting the preview.');
    }

    document.getElementById('render').onclick = render;
    document.getElementById('copy').onclick = copyFormatted;
    md.addEventListener('input', render);

    render();
  </script>
</body>
</html>
